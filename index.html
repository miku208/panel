<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, initial-scale=1.0, viewport-fit=cover">
    <title>HostFlow Admin | SaaS Dashboard Modern</title>
    <!-- Tailwind CSS CDN + Fonts + Chart.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Tailwind Override & Glow -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #0f172a;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        /* Sidebar transition */
        .sidebar-transition {
            transition: transform 0.2s ease-in-out;
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.3);
        }
        .skeleton {
            background: linear-gradient(110deg, #1e293b 8%, #334155 18%, #1e293b 33%);
            background-size: 200% 100%;
            animation: shimmer 1.5s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .mobile-sidebar {
            transform: translateX(-100%);
        }
        .mobile-sidebar.open {
            transform: translateX(0);
        }
        @media (min-width: 1024px) {
            .mobile-sidebar {
                transform: translateX(0) !important;
            }
        }
        .notification-badge {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }
        tr.transition-all {
            transition: background 0.15s;
        }
    </style>
</head>
<body class="text-gray-200">

<div class="flex h-screen overflow-hidden bg-slate-900">
    <!-- ========== SIDEBAR ========== -->
    <aside id="sidebar" class="mobile-sidebar fixed inset-y-0 left-0 z-50 w-72 bg-slate-900/95 backdrop-blur-sm border-r border-slate-800 transform transition-transform duration-300 lg:relative lg:translate-x-0">
        <div class="flex flex-col h-full">
            <!-- Logo + Brand -->
            <div class="px-6 py-5 border-b border-slate-800 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-cloud-upload-alt text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight">Host<span class="text-blue-500">Flow</span></span>
                </div>
                <button id="closeSidebarBtn" class="lg:hidden text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <!-- Menu Items -->
            <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                <a href="#" data-section="dashboard" class="nav-link flex items-center space-x-3 px-3 py-2.5 rounded-lg bg-slate-800/50 text-white transition-all">
                    <i class="fas fa-chart-line w-5"></i><span>Dashboard</span>
                </a>
                <a href="#" data-section="users" class="nav-link flex items-center space-x-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800/40 hover:text-white transition-all">
                    <i class="fas fa-users w-5"></i><span>Users</span>
                </a>
                <a href="#" data-section="servers" class="nav-link flex items-center space-x-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800/40 hover:text-white transition-all">
                    <i class="fas fa-server w-5"></i><span>Servers</span>
                </a>
                <a href="#" data-section="payments" class="nav-link flex items-center space-x-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800/40 hover:text-white transition-all">
                    <i class="fas fa-credit-card w-5"></i><span>Payments</span>
                </a>
                <a href="#" class="nav-link flex items-center space-x-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800/40 hover:text-white transition-all">
                    <i class="fas fa-history w-5"></i><span>Logs</span>
                </a>
                <a href="#" class="nav-link flex items-center space-x-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800/40 hover:text-white transition-all">
                    <i class="fas fa-sliders-h w-5"></i><span>Settings</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-800 text-xs text-slate-500">
                <i class="fas fa-shield-alt mr-1"></i> HostFlow v2.0 · Secure Gateway
            </div>
        </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- TOPBAR -->
        <header class="bg-slate-900/80 backdrop-blur-sm border-b border-slate-800 sticky top-0 z-40">
            <div class="flex items-center justify-between px-6 py-3">
                <button id="openSidebarBtn" class="lg:hidden text-gray-300 text-xl">
                    <i class="fas fa-bars"></i>
                </button>
                <!-- Search -->
                <div class="hidden md:flex items-center bg-slate-800 rounded-full px-4 py-2 w-80">
                    <i class="fas fa-search text-slate-500 mr-2"></i>
                    <input type="text" id="globalSearch" placeholder="Search users, servers..." class="bg-transparent outline-none w-full text-sm">
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Notification -->
                    <div class="relative cursor-pointer group">
                        <i class="fas fa-bell text-slate-300 text-xl"></i>
                        <span class="absolute -top-1 -right-2 w-4 h-4 bg-red-500 rounded-full text-[10px] flex items-center justify-center notification-badge">3</span>
                    </div>
                    <!-- Admin Dropdown -->
                    <div class="relative">
                        <button id="profileBtn" class="flex items-center space-x-2 focus:outline-none">
                            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center">
                                <span class="text-sm font-semibold">AD</span>
                            </div>
                            <span class="hidden md:block text-sm font-medium">Admin</span>
                            <i class="fas fa-chevron-down hidden md:block text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Wrapper -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            <!-- Loading Skeleton (initial) -->
            <div id="loadingSkeleton" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                    <div class="skeleton h-28 rounded-xl"></div><div class="skeleton h-28 rounded-xl"></div><div class="skeleton h-28 rounded-xl"></div><div class="skeleton h-28 rounded-xl"></div>
                </div>
                <div class="skeleton h-80 rounded-xl"></div>
                <div class="grid md:grid-cols-2 gap-5"><div class="skeleton h-80 rounded-xl"></div><div class="skeleton h-80 rounded-xl"></div></div>
            </div>
            
            <!-- Actual Dashboard panels container -->
            <div id="dashboardViews" class="space-y-8"></div>
            
            <div id="lastUpdateFooter" class="text-right text-slate-500 text-xs mt-6 border-t border-slate-800 pt-4"></div>
        </main>
    </div>
</div>

<script>
    // ----------------------------- MOCK DATA / STATE -----------------------------
    let stats = {
        totalUsers: 2847,
        activePanels: 2103,
        storagePercent: 68,
        ramPercent: 52,
        lastUpdated: new Date().toLocaleTimeString()
    };
    
    let usersList = [
        { email: "alice@dev.com", role: "admin", status: "active" },
        { email: "brian@panel.com", role: "user", status: "active" },
        { email: "clara@host.com", role: "user", status: "banned" },
        { email: "david@tech.io", role: "user", status: "active" },
        { email: "emma@startup.com", role: "user", status: "active" }
    ];
    
    let serversList = [
        { ip: "192.168.1.101", status: "Active", ramUsage: 42, storageUsage: 58 },
        { ip: "192.168.1.102", status: "Active", ramUsage: 71, storageUsage: 34 },
        { ip: "192.168.1.103", status: "Dead", ramUsage: 0, storageUsage: 0 },
        { ip: "192.168.1.104", status: "Active", ramUsage: 23, storageUsage: 82 },
    ];
    
    let transactions = [
        { email: "alice@dev.com", plan: "Business Pro", status: "paid" },
        { email: "brian@panel.com", plan: "Starter", status: "pending" },
        { email: "emma@startup.com", plan: "Enterprise", status: "paid" },
        { email: "david@tech.io", plan: "Starter", status: "failed" },
        { email: "unknown@test.com", plan: "Pro", status: "pending" }
    ];
    
    // Charts references
    let lineChart, barChart, pieChart;
    
    // Helper: Render date for growth chart (last 7 days)
    const last7Days = () => {
        let days = [];
        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            days.push(d.toLocaleDateString('en-US', { weekday: 'short' }));
        }
        return days;
    };
    
    // Simulate realtime update
    let interval;
    
    // Render all dashboard components (stats, charts, tables)
    async function renderDashboard() {
        const container = document.getElementById('dashboardViews');
        if(!container) return;
        
        // build html
        const statsHtml = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-5 card-hover">
                    <div class="flex justify-between"><span class="text-slate-400 text-sm">Total Users</span><i class="fas fa-users text-blue-400"></i></div>
                    <div class="text-3xl font-bold mt-2" id="statTotalUsers">${stats.totalUsers}</div>
                    <div class="text-xs text-green-400 mt-1">+12% this week</div>
                </div>
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-5 card-hover">
                    <div class="flex justify-between"><span class="text-slate-400 text-sm">Active Panels</span><i class="fas fa-check-circle text-emerald-400"></i></div>
                    <div class="text-3xl font-bold mt-2" id="statActivePanels">${stats.activePanels}</div>
                    <div class="text-xs text-emerald-400 mt-1">${Math.round((stats.activePanels/stats.totalUsers)*100)}% subscription rate</div>
                </div>
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-5 card-hover">
                    <div class="flex justify-between"><span class="text-slate-400 text-sm">Storage Usage</span><i class="fas fa-database text-sky-400"></i></div>
                    <div class="text-3xl font-bold mt-2">${stats.storagePercent}%</div>
                    <div class="w-full bg-slate-700 rounded-full h-2 mt-3"><div class="bg-blue-500 h-2 rounded-full" style="width: ${stats.storagePercent}%"></div></div>
                </div>
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-5 card-hover">
                    <div class="flex justify-between"><span class="text-slate-400 text-sm">RAM Usage</span><i class="fas fa-microchip text-indigo-400"></i></div>
                    <div class="text-3xl font-bold mt-2">${stats.ramPercent}%</div>
                    <div class="w-full bg-slate-700 rounded-full h-2 mt-3"><div class="bg-purple-500 h-2 rounded-full" style="width: ${stats.ramPercent}%"></div></div>
                </div>
            </div>
        `;
        
        const growthData = [45, 52, 58, 64, 72, 79, stats.totalUsers % 100 + 80];
        const barRamData = serversList.map(s => s.ramUsage);
        const barStorageData = serversList.map(s => s.storageUsage);
        const pieActive = stats.activePanels;
        const pieExpired = stats.totalUsers - stats.activePanels;
        
        const chartsHtml = `
            <div class="grid lg:grid-cols-2 gap-6">
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                    <h3 class="font-semibold mb-2 text-sm text-slate-300"><i class="fas fa-chart-line mr-1 text-blue-400"></i> User Growth (Daily)</h3>
                    <canvas id="lineChartCanvas" height="180"></canvas>
                </div>
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                    <h3 class="font-semibold mb-2 text-sm text-slate-300"><i class="fas fa-chart-bar mr-1 text-indigo-400"></i> RAM vs Storage / Server</h3>
                    <canvas id="barChartCanvas" height="180"></canvas>
                </div>
                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4 col-span-1 lg:col-span-2">
                    <h3 class="font-semibold mb-2 text-sm text-slate-300"><i class="fas fa-chart-pie mr-1 text-emerald-400"></i> Active vs Expired Users</h3>
                    <canvas id="pieChartCanvas" height="130"></canvas>
                </div>
            </div>
        `;
        
        // server management table
        const serverRows = serversList.map(s => `
            <tr class="border-b border-slate-700/50 transition-all">
                <td class="py-3 px-2 font-mono text-sm">${s.ip}</td>
                <td class="py-3 px-2"><span class="px-2 py-0.5 rounded-full text-xs ${s.status === 'Active' ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}">${s.status}</span></td>
                <td class="py-3 px-2"><div class="flex items-center gap-2"><span class="text-xs">${s.ramUsage}%</span><div class="w-16 bg-slate-700 rounded-full h-1.5"><div class="bg-indigo-500 h-1.5 rounded-full" style="width:${s.ramUsage}%"></div></div></div></td>
                <td class="py-3 px-2"><div class="flex items-center gap-2"><span class="text-xs">${s.storageUsage}%</span><div class="w-16 bg-slate-700 rounded-full h-1.5"><div class="bg-sky-500 h-1.5 rounded-full" style="width:${s.storageUsage}%"></div></div></div></td>
                <td class="py-3 px-2"><button class="text-blue-400 hover:text-blue-300 text-xs mr-2 edit-server" data-ip="${s.ip}"><i class="fas fa-edit"></i> Edit</button><button class="text-red-400 hover:text-red-300 text-xs replace-server" data-ip="${s.ip}">Replace</button></td>
            </tr>
        `).join('');
        
        const serverHtml = `
            <div class="bg-slate-800/40 rounded-xl border border-slate-700 overflow-hidden">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center flex-wrap"><h3 class="font-semibold"><i class="fas fa-server mr-2 text-blue-400"></i>Server Management</h3><span class="text-xs text-slate-400">Last sync: ${stats.lastUpdated}</span></div>
                <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-900/60"><tr><th class="text-left p-3">IP Address</th><th class="text-left p-3">Status</th><th class="text-left p-3">RAM</th><th class="text-left p-3">Storage</th><th class="text-left p-3">Actions</th></tr></thead><tbody>${serverRows}</tbody></table></div>
            </div>
        `;
        
        const paymentRows = transactions.map(tx => `
            <tr class="border-b border-slate-700/50">
                <td class="py-2 px-3">${tx.email}</td><td class="py-2 px-3">${tx.plan}</td>
                <td class="py-2 px-3"><span class="px-2 py-0.5 rounded-full text-xs ${tx.status === 'paid' ? 'bg-emerald-500/20 text-emerald-400' : tx.status === 'pending' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-red-500/20 text-red-400'}">${tx.status}</span></td>
            </tr>
        `).join('');
        const paymentHtml = `<div class="bg-slate-800/40 rounded-xl border border-slate-700"><div class="p-4 border-b"><h3 class="font-semibold"><i class="fas fa-credit-card mr-2 text-green-400"></i>Payment Transactions</h3></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-900/60"><tr><th class="p-3 text-left">Email</th><th class="p-3 text-left">Plan</th><th class="p-3 text-left">Status</th></tr></thead><tbody>${paymentRows}</tbody></table></div></div>`;
        
        const userRows = usersList.map(u => `
            <tr class="border-b border-slate-700/50">
                <td class="py-2 px-3">${u.email}</td><td class="py-2 px-3 capitalize">${u.role}</td>
                <td class="py-2 px-3"><span class="px-2 py-0.5 rounded-full text-xs ${u.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${u.status}</span></td>
                <td class="py-2 px-3"><button class="text-amber-400 text-xs mr-2 suspend-user" data-email="${u.email}"><i class="fas fa-ban"></i> Suspend</button><button class="text-blue-400 text-xs promote-admin" data-email="${u.email}"><i class="fas fa-user-shield"></i> Promote</button></td>
            </tr>
        `).join('');
        const userHtml = `<div class="bg-slate-800/40 rounded-xl border border-slate-700"><div class="p-4 border-b"><h3 class="font-semibold"><i class="fas fa-users mr-2 text-blue-400"></i>User Management</h3></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-900/60"><tr><th class="p-3 text-left">Email</th><th class="p-3 text-left">Role</th><th class="p-3 text-left">Status</th><th class="p-3 text-left">Actions</th></tr></thead><tbody>${userRows}</tbody></table></div></div>`;
        
        // full dashboard layout
        container.innerHTML = `
            <div id="mainDashboardView">${statsHtml}${chartsHtml}${serverHtml}<div class="grid md:grid-cols-2 gap-6 mt-6">${paymentHtml}${userHtml}</div></div>
            <div id="usersOnlyView" class="hidden">${userHtml}</div>
            <div id="serversOnlyView" class="hidden">${serverHtml}</div>
            <div id="paymentsOnlyView" class="hidden">${paymentHtml}</div>
        `;
        
        // init charts after dom insertion
        if (lineChart) lineChart.destroy();
        if (barChart) barChart.destroy();
        if (pieChart) pieChart.destroy();
        
        const ctxLine = document.getElementById('lineChartCanvas')?.getContext('2d');
        if(ctxLine) lineChart = new Chart(ctxLine, { type: 'line', data: { labels: last7Days(), datasets: [{ label: 'New Users', data: growthData, borderColor: '#3b82f6', tension: 0.3, fill: true, backgroundColor: 'rgba(59,130,246,0.1)' }] }, options: { responsive: true, maintainAspectRatio: true } });
        
        const ctxBar = document.getElementById('barChartCanvas')?.getContext('2d');
        if(ctxBar) barChart = new Chart(ctxBar, { type: 'bar', data: { labels: serversList.map(s=>s.ip.slice(-3)), datasets: [{ label: 'RAM %', data: barRamData, backgroundColor: '#8b5cf6' }, { label: 'Storage %', data: barStorageData, backgroundColor: '#06b6d4' }] }, options: { responsive: true, maintainAspectRatio: true } });
        
        const ctxPie = document.getElementById('pieChartCanvas')?.getContext('2d');
        if(ctxPie) pieChart = new Chart(ctxPie, { type: 'pie', data: { labels: ['Active Subscriptions', 'Expired/Inactive'], datasets: [{ data: [pieActive, pieExpired], backgroundColor: ['#3b82f6', '#475569'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
        
        attachTableActions();
        updateLastUpdatedText();
    }
    
    function attachTableActions() {
        document.querySelectorAll('.edit-server').forEach(btn => btn.addEventListener('click', (e) => { alert(`Edit server ${btn.dataset.ip} - demo edit modal`); }));
        document.querySelectorAll('.replace-server').forEach(btn => btn.addEventListener('click', (e) => { alert(`Replace server ${btn.dataset.ip} (provision new VM)`); }));
        document.querySelectorAll('.suspend-user').forEach(btn => btn.addEventListener('click', (e) => { let email = btn.dataset.email; toggleUserStatus(email, 'banned'); refreshCurrentView(); }));
        document.querySelectorAll('.promote-admin').forEach(btn => btn.addEventListener('click', (e) => { let email = btn.dataset.email; let user = usersList.find(u=>u.email===email); if(user) user.role = 'admin'; refreshCurrentView(); alert(`${email} promoted to admin`); }));
    }
    
    function toggleUserStatus(email, newStatus) {
        let user = usersList.find(u=>u.email===email);
        if(user) user.status = newStatus;
        refreshCurrentView();
    }
    
    function refreshCurrentView() {
        // re-render dashboard completely based on active section
        const active = document.querySelector('.nav-link.bg-slate-800\\/50')?.dataset.section || 'dashboard';
        switchSection(active);
    }
    
    function updateLastUpdatedText() { 
        const footerDiv = document.getElementById('lastUpdateFooter');
        if(footerDiv) footerDiv.innerHTML = `<i class="far fa-clock mr-1"></i> Last updated: ${new Date().toLocaleString()}`;
    }
    
    // simulate realtime stats growth increment
    function simulateRealtime() {
        if(interval) clearInterval(interval);
        interval = setInterval(() => {
            let randomDelta = Math.floor(Math.random() * 3);
            stats.totalUsers += randomDelta;
            stats.activePanels += Math.random() > 0.7 ? 1 : 0;
            stats.storagePercent = Math.min(98, stats.storagePercent + (Math.random() > 0.8 ? 0.5 : 0));
            stats.ramPercent = Math.min(95, stats.ramPercent + (Math.random() > 0.8 ? 0.4 : 0));
            stats.lastUpdated = new Date().toLocaleTimeString();
            updateStatNumbersDOM();
            updateLastUpdatedText();
            // refresh charts data? optional but growth line chart needs update: we can re-render dashboard softly
            // not to disturb user view? we can simply update numeric stats
        }, 5000);
    }
    
    function updateStatNumbersDOM() {
        const totalSpan = document.getElementById('statTotalUsers');
        const activeSpan = document.getElementById('statActivePanels');
        if(totalSpan) totalSpan.innerText = stats.totalUsers;
        if(activeSpan) activeSpan.innerText = stats.activePanels;
        // For storage/ram visual bars we re-render later on section switch..
        // simpler: recall renderDashboard if needed? but that's heavy. we'll just re-render on toggle but numbers live:
        // for demo we trust stats object updated; next render will apply
        const storagePercentDiv = document.querySelector('.bg-blue-500.h-2');
        const ramPercentDiv = document.querySelector('.bg-purple-500.h-2');
        if(storagePercentDiv) storagePercentDiv.style.width = `${stats.storagePercent}%`;
        if(ramPercentDiv) ramPercentDiv.style.width = `${stats.ramPercent}%`;
        const storagePercentText = document.querySelector('.bg-slate-800\\/40 .text-3xl.font-bold');
        if(storagePercentText && storagePercentText.parentElement?.querySelector('.text-3xl')) {
            // not robust: but we skip aggressive dom query
        }
    }
    
    async function switchSection(sectionId) {
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('bg-slate-800/50', 'text-white'));
        const activeLink = Array.from(document.querySelectorAll('.nav-link')).find(link => link.dataset.section === sectionId);
        if(activeLink) activeLink.classList.add('bg-slate-800/50', 'text-white');
        else document.querySelector('.nav-link[data-section="dashboard"]')?.classList.add('bg-slate-800/50','text-white');
        
        const mainDiv = document.getElementById('mainDashboardView');
        const usersDiv = document.getElementById('usersOnlyView');
        const serversDiv = document.getElementById('serversOnlyView');
        const paymentsDiv = document.getElementById('paymentsOnlyView');
        if(!mainDiv) return;
        
        if(sectionId === 'users') { mainDiv?.classList.add('hidden'); usersDiv?.classList.remove('hidden'); serversDiv?.classList.add('hidden'); paymentsDiv?.classList.add('hidden'); }
        else if(sectionId === 'servers') { mainDiv?.classList.add('hidden'); serversDiv?.classList.remove('hidden'); usersDiv?.classList.add('hidden'); paymentsDiv?.classList.add('hidden'); }
        else if(sectionId === 'payments') { mainDiv?.classList.add('hidden'); paymentsDiv?.classList.remove('hidden'); usersDiv?.classList.add('hidden'); serversDiv?.classList.add('hidden'); }
        else { mainDiv?.classList.remove('hidden'); usersDiv?.classList.add('hidden'); serversDiv?.classList.add('hidden'); paymentsDiv?.classList.add('hidden'); }
        updateLastUpdatedText();
    }
    
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const section = link.dataset.section;
            if(section) switchSection(section);
        });
    });
    
    // Sidebar mobile toggles
    const sidebar = document.getElementById('sidebar');
    document.getElementById('openSidebarBtn')?.addEventListener('click', () => sidebar.classList.add('open'));
    document.getElementById('closeSidebarBtn')?.addEventListener('click', () => sidebar.classList.remove('open'));
    
    // load init
    window.onload = async () => {
        document.getElementById('loadingSkeleton')?.remove();
        await renderDashboard();
        simulateRealtime();
        // profile dropdown dummy
        document.getElementById('profileBtn')?.addEventListener('click', () => alert("Admin profile: role SuperAdmin\nEmail: admin@hostflow.dev"));
        // search mock
        document.getElementById('globalSearch')?.addEventListener('input', (e) => { console.log('searching:', e.target.value); });
    };
</script>
</body>
</html>
